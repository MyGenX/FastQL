name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify release tag matches package version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          RUNTIME_VERSION=$(python -c "import fastql; print(fastql.__version__)")
          if [[ "$RUNTIME_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "fastql.__version__ ($RUNTIME_VERSION) does not match project version $PACKAGE_VERSION."
            exit 1
          fi
          if [[ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version v$PACKAGE_VERSION."
            exit 1
          fi

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mygenx-fastql
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
